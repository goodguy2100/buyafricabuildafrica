name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate route tree
        run: bun x @tanstack/router-cli generate

      - name: Build
        run: bun run build

      - name: Fix asset paths and create index.html
        run: |
          # Fix absolute asset paths in JS files - add subdirectory prefix
          echo "Fixing asset paths in built files..."
          find dist/client -name "*.js" -exec sed -i 's|"/assets/|"/buyafricabuildafrica/assets/|g' {} +
          find dist/client -name "*.css" -exec sed -i 's|url("/assets/|url("/buyafricabuildafrica/assets/|g' {} +
          find dist/client -name "*.js" -exec sed -i "s|'/assets/|'/buyafricabuildafrica/assets/|g" {} +
          
          # Create index.html
          JS=$(ls dist/client/assets/index-*.js | head -1 | xargs basename)
          CSS=$(ls dist/client/assets/styles-*.css | head -1 | xargs basename)
          echo "JS=$JS CSS=$CSS"
          
          cat > dist/client/index.html << HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Buy Africa Build Africa (BABA)</title>
            <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
            <link rel="stylesheet" href="/buyafricabuildafrica/assets/${CSS}" />
          </head>
          <body>
            <div id="root"></div>
            <script type="module" crossorigin src="/buyafricabuildafrica/assets/${JS}"></script>
          </body>
          </html>
          HTML
          echo "--- index.html ---"
          cat dist/client/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
